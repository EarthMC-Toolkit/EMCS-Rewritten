name: update-remote
run-name: Sync changes to remote

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_DIR: /home/runner/.ssh
      SSH_KEYPATH: /home/runner/.ssh/id_ed25519
      SCRIPTS_DIR: /home/${{ secrets.ORACLE_USER2 }}/emcs-scripts
      SCRIPT_NAME: git_sync.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v47

      - name: Setup SSH
        run: |
          mkdir -p ${{ env.SSH_DIR }}
          echo "${{ secrets.ORACLE_KEY }}" > ${{ env.SSH_KEYPATH }}
          chmod 600 ${{ env.SSH_KEYPATH }}
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ${{ env.SSH_DIR }}/known_hosts

      - name: Update remote files
        run: ssh -i ${{ env.SSH_KEYPATH }} ${{ secrets.ORACLE_USER1 }}@${{ secrets.ORACLE_HOST }} "$SCRIPTS_DIR/$SCRIPT_NAME"

      - name: File changelog
        run: |
          ALL="${{ steps.files.outputs.all_changed_files }}"
          MODIFIED="${{ steps.files.outputs.modified_files }}"
          ADDED="${{ steps.files.outputs.added_files }}"
          DELETED="${{ steps.files.outputs.deleted_files }}"
          RENAMED="${{ steps.files.outputs.renamed_files }}"

          print_section () {
            NAME="$1"
            DATA="$2"

            if [ -n "$DATA" ]; then
              COUNT=$(echo $DATA | wc -w)
              echo "$NAME [$COUNT]:"
              echo "$DATA"
              echo
            fi
          }

          echo "===== FILE CHANGES ====="
          echo

          print_section "All" "$ALL"
          print_section "Modified" "$MODIFIED"
          print_section "Added" "$ADDED"
          print_section "Deleted" "$DELETED"
          print_section "Renamed" "$RENAMED"

          echo "========================"